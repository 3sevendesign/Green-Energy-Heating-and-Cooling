      max-width: 520px;

      padding: 3.5rem 3rem;
      text-align: center;
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .check {

      width: 56px;
      height: 56px;

      margin-bottom: 0.8rem;

      font-weight: 300;
      color: #5a6b58;
      line-height: 1.8;
      margin-bottom: 0.5rem;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: #b07d18;
      opacity: 0.4;
      margin: 1.5rem auto;
    }

    .phone {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      color: #1c3a22;
      text-decoration: none;
      transition: color 0.2s;
    }

    .phone:hover { color: #2a6640; }

    .btn {
      display: inline-block;
      margin-top: 2rem;
      background: #1c3a22;
      color: #fff;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.9rem 2rem;
      border-radius: 4px;
      text-decoration: none;
      box-shadow: 0 3px 14px rgba(26,43,30,0.25);
      transition: background 0.2s;
